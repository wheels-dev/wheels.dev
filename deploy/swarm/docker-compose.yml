services:
  wheels-dev:
    image: ghcr.io/wheels-dev/wheels-dev:${IMAGE_TAG}
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 10s
      placement:
        constraints: []
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.25'
          memory: 1G
      labels:
        - "traefik.enable=true"
        # wheels.dev router (HTTP only - Cloudflare handles TLS)
        - "traefik.http.routers.wheels-dev.rule=Host(`wheels.dev`)"
        - "traefik.http.routers.wheels-dev.entrypoints=web"
        # Backend service
        - "traefik.http.services.wheels-dev.loadbalancer.server.port=8888"
        - "traefik.http.services.wheels-dev.loadbalancer.sticky.cookie=true"
        - "traefik.http.services.wheels-dev.loadbalancer.sticky.cookie.name=wheels_affinity"
        - "traefik.http.services.wheels-dev.loadbalancer.sticky.cookie.httponly=true"
        # www -> apex redirect middleware
        - "traefik.http.middlewares.wheels-dev-www-redirect.redirectregex.regex=^https?://www\\.wheels\\.dev/(.*)"
        - "traefik.http.middlewares.wheels-dev-www-redirect.redirectregex.replacement=https://wheels.dev/$${1}"
        - "traefik.http.middlewares.wheels-dev-www-redirect.redirectregex.permanent=true"
        # www.wheels.dev router (redirects to apex)
        - "traefik.http.routers.wheels-dev-www.rule=Host(`www.wheels.dev`)"
        - "traefik.http.routers.wheels-dev-www.entrypoints=web"
        - "traefik.http.routers.wheels-dev-www.middlewares=wheels-dev-www-redirect"
    environment:
      PORT: 8888
      HEALTHCHECK_URI: "http://127.0.0.1:8888/"
      BOX_SERVER_JVM_ARGS: "-Xms2g -Xmx3g"
      # App configuration (non-secret)
      environment: production
      application_host: "https://wheels.dev"
      datasource: "wheels.dev"
      wheelsdev_clob: "true"
      wheelsdev_connectionlimit: "100"
      wheelsdev_storage: "true"
      sessionStorage: "wheels.dev"
      sessionCluster: "true"
      test_case: "false"
      mail_from: "noreply@wheels.dev"
      smtp_host: "smtp.postmarkapp.com"
      smtp_port: "587"
      smtp_ssl: "false"
      smtp_tls: "true"
      SENTRY_ENVIRONMENT: production
      # Secrets — resolved by envsubst at deploy time
      reloadPassword: "${RELOAD_PASSWORD}"
      cfconfig_adminPassword: "${CFCONFIG_ADMIN_PASSWORD}"
      wheelsdev_host: "${WHEELSDEV_HOST}"
      wheelsdev_port: "${WHEELSDEV_PORT}"
      wheelsdev_databasename: "${WHEELSDEV_DATABASENAME}"
      wheelsdev_username: "${WHEELSDEV_USERNAME}"
      wheelsdev_password: "${WHEELSDEV_PASSWORD}"
      smtp_username: "${SMTP_USERNAME}"
      smtp_password: "${SMTP_PASSWORD}"
      wheels_id_salt: "${WHEELS_ID_SALT}"
      SENTRY_DSN: "${SENTRY_DSN}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8888/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 600s
    networks:
      - proxy
    volumes:
      - shared-images:/app/public/images
      - shared-files:/app/public/files
      - shared-sitemap-prod:/app/public/sitemap
      - shared-dev-docs:/app/docs/3.0.0/guides
      - shared-json-folder:/app/public/json
      - wheels-data:/data

networks:
  proxy:
    external: true

volumes:
  shared-images:
    external: true
  shared-files:
    external: true
  shared-sitemap-prod:
    external: true
  shared-dev-docs:
    external: true
  shared-json-folder:
    external: true
  wheels-data:
    external: true
