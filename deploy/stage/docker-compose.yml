version: '3.8'

services:
  wheels-dev:
    image: 10.100.10.116:5000/wheels-dev-stage
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first
        failure_action: pause
      placement:
        constraints: []
    ports:
      - "50151:60151"
    environment:
      - PORT=60151
      - HEALTHCHECK_URI=http://127.0.0.1:60151/
#      - JVM_HEAPSIZE=1024
#      - BOX_SERVER_DEBUG=true
    networks:
      - wheels-net
    volumes:
      - shared-images:/app/public/images
      - shared-files:/app/public/files
 #     - shared-public:/app/public
      - wheels-data:/data

networks:
  wheels-net:
    driver: overlay

volumes:
  shared-images:
    external: true
  shared-files:
    external: true
#  shared-public:
#    external: true
  wheels-data:
