services:
  app:
    build:
      context: .
      dockerfile: dockerfile
    container_name: wheels_app
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 1433
      DB_DATABASE: wheels_dev
      DB_USERNAME: sa
      DB_PASSWORD: "@bjs0016"
    ports:
      - "60151:60151" # change if your app uses a different port
    networks:
      - wheels_net

  db:
    build:
      context: .
      dockerfile: Dockerfile_db
    image: wheels-db
    container_name: wheels_db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
      MSSQL_SA_PASSWORD: "@bjs0016"
    ports:
      - "1433:1433"
    networks:
      - wheels_net
    volumes:
      - db_data:/var/opt/mssql

volumes:
  db_data:

networks:
  wheels_net:
