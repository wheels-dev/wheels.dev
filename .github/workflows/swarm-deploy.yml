name: Deploy to Docker Swarm

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/wheels-dev/wheels-dev
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy swarm config files to root
        run: |
          cp ./deploy/swarm/.env ./
          cp ./deploy/swarm/dockerfile ./

      - name: Install CommandBox
        uses: Ortus-Solutions/setup-commandbox@v2.0.1
        with:
          forgeboxAPIKey: ${{ secrets.FORGEBOX_API_KEY }}

      - name: Install wheels-cli and dependencies
        run: |
          box install wheels-cli
          box install

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Swarm
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SWARM_SSH_PRIVATE_KEY }}" > ~/.ssh/swarm_key
          chmod 600 ~/.ssh/swarm_key
          ssh-keyscan -H 10.100.10.234 >> ~/.ssh/known_hosts 2>/dev/null
          cat > ~/.ssh/config <<'EOF'
          Host swarm-manager
            HostName 10.100.10.234
            User petera
            IdentityFile ~/.ssh/swarm_key
            StrictHostKeyChecking no
          EOF
          sed -i 's/^          //' ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Create Docker context for swarm manager
        run: |
          docker context create swarm --docker "host=ssh://swarm-manager"
          docker context use swarm

      - name: Login to GHCR on swarm
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        run: |
          echo "$GHCR_TOKEN" | docker --context swarm login ghcr.io -u "$GH_ACTOR" --password-stdin

      - name: Deploy stack to swarm
        run: |
          docker --context swarm stack deploy \
            --with-registry-auth \
            -c deploy/swarm/docker-compose.yml \
            wheels-dev

      - name: Verify deployment
        run: |
          echo "Waiting for services to stabilize..."
          sleep 30
          docker --context swarm service ls
          echo ""
          echo "Checking wheels-dev service replicas..."
          docker --context swarm service ps wheels-dev_wheels-dev --no-trunc
