name: Wheels.dev

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64, prod]

    env:
      APP_DIR: /home/wheels-1/wheels.dev

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Prepare application directory
        run: |
          mkdir -p "$APP_DIR"
          rsync -av --delete ./ "$APP_DIR/"

      - name: Create Environment Files
        working-directory: ${{ env.APP_DIR }}
        run: |
          cp ./deploy/stage/.env .
          cp ./deploy/stage/server.json .

      - name: Install Wheels CLI
        working-directory: ${{ env.APP_DIR }}
        run: |
          box install wheels-cli

      - name: Install Dependencies
        working-directory: ${{ env.APP_DIR }}
        run: |
          box install

      - name: Restart Wheels Server via systemd
        run: |
          sudo systemctl restart wheelsdev.service


