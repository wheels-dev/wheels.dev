name: Wheels.dev

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64, prod]

    env:
      APP_DIR: /home/wheels-1/wheels.dev

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Prepare application directory
        run: |
          mkdir -p "$APP_DIR"
          rsync -av --delete ./ "$APP_DIR/"

      - name: Create Environment Files
        working-directory: ${{ env.APP_DIR }}
        run: |
          cp ./deploy/prod/.env .
          cp ./deploy/prod/server.json .

      - name: Install Wheels CLI
        working-directory: ${{ env.APP_DIR }}
        run: |
          box install wheels-cli

      - name: Install Dependencies
        working-directory: ${{ env.APP_DIR }}
        run: |
          box install

      - name: Setup systemd service
        run: |
          if [ ! -f /etc/systemd/system/wheelsdev.service ]; then
            BOX_PATH=$(which box)
            sudo tee /etc/systemd/system/wheelsdev.service > /dev/null <<EOF
          [Unit]
          Description=Wheels.dev CommandBox Server
          After=network.target

          [Service]
          Type=forking
          User=wheels-1
          WorkingDirectory=$APP_DIR
          ExecStart=$BOX_PATH server start
          ExecStop=$BOX_PATH server stop
          Restart=always
          RestartSec=10

          [Install]
          WantedBy=multi-user.target
          EOF
            sudo systemctl daemon-reload
            sudo systemctl enable wheelsdev.service
          fi

      - name: Restart Wheels Server
        working-directory: ${{ env.APP_DIR }}
        run: |
          box server stop || true
          sudo systemctl restart wheelsdev.service
          sleep 10
          box server status || true


