name: Wheels.dev

on:
  push:
    branches:
      - dev

jobs:
  build-and-deploy-to-docker-swarm:
    runs-on: [self-hosted, linux, pai]

    steps:
      - name: Checkout Repository
        id: Checkout-Repository
        uses: actions/checkout@v4

      - name: Create .env File
        id: Create-Env-File
        run: |
          mv .env-testing .env

      - name: Install Dependencies
        id: Install-Dependencies
        run: |
          box install

      - name: Push Docker Image
        id: Push-Docker-Image
        run: |
          docker build -t ${{ secrets.REGISTRY_IP }}:${{ secrets.PORT }}/wheels-img .
          docker push ${{ secrets.REGISTRY_IP }}:${{ secrets.PORT }}/wheels-img

      - name: Deploy to Docker Swarm
        id: Deploy-to-Docker-Swarm
        run: |
          docker pull ${{ secrets.REGISTRY_IP }}:${{ secrets.PORT }}/wheels-img:dev
          docker stack deploy -c docker-compose.yml wheels-dev
