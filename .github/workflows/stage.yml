name: Wheels.dev

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64, stage]

    env:
      APP_DIR: /home/wheels/wheels.dev

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Prepare application directory
        run: |
          mkdir -p "$APP_DIR"
          rsync -av --delete ./ "$APP_DIR/"

      - name: Ensure Java 11 is installed
        run: |
          if [ ! -d "/opt/jdk-11.0.21+9" ]; then
            cd /tmp
            curl -sL 'https://github.com/adoptium/temurin11-binaries/releases/download/jdk-11.0.21%2B9/OpenJDK11U-jdk_x64_linux_hotspot_11.0.21_9.tar.gz' -o java11.tar.gz
            sudo tar -xzf java11.tar.gz -C /opt
            rm java11.tar.gz
          fi

      - name: Create Environment Files
        working-directory: ${{ env.APP_DIR }}
        run: |
          cp ./deploy/stage/.env .
          cp ./deploy/stage/server.json .

      - name: Install Wheels CLI
        working-directory: ${{ env.APP_DIR }}
        run: |
          box install wheels-cli

      - name: Install Dependencies
        working-directory: ${{ env.APP_DIR }}
        run: |
          box install

      - name: Restart Wheels Server via systemd
        working-directory: ${{ env.APP_DIR }}
        run: |
          box server stop || true
          sudo systemctl restart wheelsdev.service
          sleep 5
          sudo systemctl status wheelsdev.service
