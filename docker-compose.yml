version: '3.8'

services:
  wheels:
    image: 10.100.10.116:5000/wheels-img
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first
        failure_action: pause
      placement:
        constraints: []
    ports:
      - "50052:60052"
    environment:
      - PORT=60052
      - HEALTHCHECK_URI=http://127.0.0.1:60052/
    networks:
      - wheels-net
    volumes:
      - wheels-data:/data

networks:
  wheels-net:
    driver: overlay

volumes:
  wheels-data:
